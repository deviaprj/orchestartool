## JUSTIFICATIONS TECHNIQUES DÉTAILLÉES

technical_decisions:
  framework_choice: |
    **Next.js 14 vs alternatives:**
    
    Pourquoi Next.js:
    ✅ SSR/SSG natif = excellent SEO (critique pour marketplace)
    ✅ API Routes intégrées = pas besoin serveur séparé
    ✅ Image optimization automatique
    ✅ File-based routing simple
    ✅ Typescript support excellent
    ✅ Déploiement facile (Vercel)
    ✅ Grande communauté = nombreuses ressources
    
    Alternatives écartées:
    ❌ React SPA pure: Mauvais SEO, pas d'SSR
    ❌ Vue/Nuxt: Moins d'écosystème pour marketplace
    ❌ Angular: Plus complexe, courbe apprentissage
    ❌ Framework backend séparé (Express): Double setup, plus long
  
  database_choice: |
    **PostgreSQL vs alternatives:**
    
    Pourquoi PostgreSQL:
    ✅ Données relationnelles complexes (users, bookings, reviews)
    ✅ ACID compliance pour transactions paiement
    ✅ Extension PostGIS pour requêtes géographiques performantes
    ✅ Full-text search intégré
    ✅ JSON support si besoin
    ✅ Excellent avec Prisma ORM
    ✅ Gratuit et open-source
    
    Alternatives écartées:
    ❌ MongoDB: Moins adapté pour relations complexes
    ❌ MySQL: PostGIS moins bon, moins de features avancées
    ❌ SQLite: Pas assez robuste pour production future
  
  styling_choice: |
    **Tailwind CSS vs alternatives:**
    
    Pourquoi Tailwind:
    ✅ Développement ultra rapide (utility-first)
    ✅ Pas de CSS custom à écrire
    ✅ Design system cohérent via config
    ✅ Purge CSS automatique = bundle léger
    ✅ Responsive design facile
    ✅ Excellente intégration shadcn/ui
    
    Alternatives écartées:
    ❌ CSS Modules: Plus lent à développer
    ❌ Styled-components: Runtime overhead
    ❌ Bootstrap: Moins moderne, plus lourd
  
  state_management: |
    **Zustand vs alternatives:**
    
    Pourquoi Zustand:
    ✅ Simple et léger (1kb)
    ✅ Pas de boilerplate (vs Redux)
    ✅ Hooks-based API
    ✅ Excellent TypeScript support
    ✅ Pas de Provider wrapper nécessaire
    
    Alternatives écartées:
    ❌ Redux: Trop de boilerplate pour MVP
    ❌ Context API: Performance issues si state complexe
    ❌ Jotai/Recoil: Plus récents, moins de ressources

